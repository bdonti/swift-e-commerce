<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftCart E-Commerce | Products</title>
    
    <!-- font awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind & daisyUI  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="style.css">

    <!-- font integration  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
     <!-- navbar section starts --> 
    <section class="w-full md:w-7/12 mx-auto">
    <div class="navbar bg-base-100 shadow-sm">
     <div class="navbar-start">
        <a class="btn btn-ghost text-xl text-primary font-bold">SwiftCart</a>
    </div>
    <div class="navbar-center hidden lg:flex">
        <ul class="menu menu-horizontal px-1">
            <li><a href="./index.html">Home</a></li>
            <li><a href="./products.html">Products</a></li>
            <li><a>About</a></li>
            <li><a>Contact</a></li>
        </ul>
    </div>
    <div class="navbar-end">
        <a class="btn btn-ghost text-xl"><i class="fa-solid fa-cart-shopping text-primary"></i></a>
        <div class="dropdown">
        <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" /> </svg>
        </div>
        <ul
            tabindex="-1"
            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
            <li><a>Home</a></li>
            <li><a>Products</a></li>
            <li><a>About</a></li>
            <li><a>Contact</a></li>
        </ul>
        </div>
    </div>
    </div>
    </section>
    
    <!-- navbar section ends  -->

    <!-- our products section starts  -->
    <h2 class="text-3xl font-bold text-center my-5">Our Products</h2>
    <div class="flex justify-center gap-6 mb-6">
        <button onclick="loadAllProducts()" class="btn">All</button>
        <div id="categories" class="flex justify-center gap-6">
        
        </div>
    </div>

    
    <section class="w-full md:w-7/12 mx-auto">
        <!-- all products  -->
        <div id="all-products-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3">


        </div>
        <!-- all products ends  -->

        <!-- all category products  -->
        <div id="category-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3">


        </div>
    </section>


    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</body>
</html>
